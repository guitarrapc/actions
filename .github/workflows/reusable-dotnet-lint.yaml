name: (R) dotnet lint

on:
  workflow_call:
    inputs:
      sln-root:
        description: .sln root to execute dotnet-format.
        default: "${{ github.workspace }}"
        required: false
        type: string
      sln-file:
        description: .sln file to execute dotnet-format. If you have multiple .sln files, you must specify the one you want to use.
        default: ""
        required: false
        type: string
      dotnet-version:
        description: .NET SDK version to use
        default: |
          8.0.x
          9.0.x
          10.0.x
        required: false
        type: string
      base-branch:
        description: Base branch to create PR
        default: ${{ github.event.repository.default_branch }}
        required: false
        type: string
      exclude-csprojs:
        default: ""
        description: |
          Specify csproj to exclude from format, there are two ways to specify:
          1. specify csproj in single line
            ```
            exluce-csprojs: foo.csproj bar.csproj
            ```

          2. specify csproj in multi line
            ```
            exluce-csprojs: |
              foo.csproj
              bar.csproj
            ```
        required: false
        type: string

jobs:
  lint:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
        with:
          persist-credentials: false
      - name: Prepare .NET
        uses: guitarrapc/actions/.github/actions/setup-dotnet@main
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          restore-wasm-workload: "true"

      - name: Create excludes arguments
        id: exclude-args
        run: |
          exclude_args=""
          if [[ "${{ inputs.exclude-csprojs }}" != "" ]]; then
            exclude_csprojs="${{ inputs.exclude-csprojs }}"
            IFS=" " read -r -a csprojs <<< "${exclude_csprojs//$'\n'/ }"
            for item in "${csprojs[@]}"; do
              exclude_args+="-v $item ";
            done
          fi
          echo "argument=$exclude_args" | tee -a "$GITHUB_OUTPUT"
      # dotnet list
      - name: Obtain csproj to lint
        run: |
          if [[ "${{ steps.exclude-args.outputs.argument }}" != "" ]]; then
            projects=$(dotnet sln ${{ inputs.sln-file }} list | tail -n +3 | grep ${{ steps.exclude-args.outputs.argument }})
          else
            projects=$(dotnet sln ${{ inputs.sln-file }} list | tail -n +3)
          fi
          format_projects=$(echo "$projects" | sort | xargs -n 1 echo '  *')
          IFS=" " read -r -a array_projects <<< "${projects//$'\n'/ }"

          {
            echo "PROJECTS<<EOF"
            echo "${projects}"
            echo "EOF"
          } | tee -a "$GITHUB_ENV"
          {
            echo "FORMAT_PROJECTS<<EOF"
            echo "${format_projects}"
            echo "EOF"
          } | tee -a "$GITHUB_ENV"
          echo "PROJECT_LENGTH=${#array_projects[@]}" | tee -a "$GITHUB_ENV"
        working-directory: ${{ inputs.sln-root }}

      - name: Add dotnet-format problem matcher
        uses: xt0rted/dotnet-format-problem-matcher@b90c4f18e3daa4f8fd266e41eba4f351b2e00b75 # v1.2.0

      # dotnet format is build-in from dotnet 6.0 sdk. --exclude is for path, NOT project.
      - name: Dotnet Format
        run: |
          i=0
          echo "${{ env.PROJECTS }}" | while IFS= read -r csproj; do
            echo "($((i=i+1))/${{ env.PROJECT_LENGTH }}) formatting csproj '$csproj'."
            dotnet format "$csproj" --verbosity diagnostic
          done
        working-directory: ${{ inputs.sln-root }}

      # check format may not broken the code.
      - name: Dotnet Build
        run: dotnet build
        working-directory: ${{ inputs.sln-root }}

      # is change happen?
      - name: Check for modified files
        id: git-check
        run: echo "modified=$(if [[ "$(git status --porcelain=v1 2>/dev/null | wc -l)" == "0" ]]; then echo "false"; else echo "true"; fi)" | tee -a "$GITHUB_OUTPUT"

      # get directory stats
      - name: List modified directories
        if: ${{ steps.git-check.outputs.modified == 'true' }}
        run: |
          dirs=$(git diff --dirstat=files)
          {
            echo "CHANGED_DIRS<<EOF"
            echo "${dirs}"
            echo "EOF"
          } | tee -a "$GITHUB_ENV"

      # get files stats
      - name: List modified files
        if: ${{ steps.git-check.outputs.modified == 'true' }}
        run: |
          files=$(git diff --name-only)
          {
            echo "CHANGED_FILES<<EOF"
            echo "${files}"
            echo "EOF"
          } | tee -a "$GITHUB_ENV"

      # Commit if change happen, then craete PR. force push when branch/pr already exists.
      - name: commit
        run: |
          git remote set-url origin "https://github-actions:${GITHUB_TOKEN}@github.com/${{ github.repository }}"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          git checkout -b "auto-pr/dotnet-format"
          git add .
          git commit -m "[dotnet format] Automated changes by $GITHUB_WORKFLOW" || true
          git push -u origin "auto-pr/dotnet-format" --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
      - name: Create PullRequest
        if: ${{ steps.git-check.outputs.modified == 'true' }}
        run: |
          pr_exists=$(gh pr list --head "auto-pr/dotnet-format" --base "${{ github.event.repository.default_branch}}")
          if [ -n "$pr_exists" ]; then
            echo "PR already exists for auto-pr/dotnet-format -> ${{ github.event.repository.default_branch}}. Skipping creation."
          else
            title="[dotnet format] Automated changes"
            cat << 'EOF' > pr_body.txt
            ## tl;dr;
            dotnet format generated changes based on .editorconfig

            ## Stats

            changed directories

            ```
            ${{ env.CHANGED_DIRS }}
            ```

            ## Files

            <details>
            <summary>Click to show.</summary>

            ```
            ${{ env.CHANGED_FILES }}
            ```

            </details>

            ## Target Projects

            Target project number is ${{ env.PROJECT_LENGTH }}.

            ${{ env.FORMAT_PROJECTS }}

            ---

            This PR was created automatically via [${{ github.workflow }}]($GITHUB_ACTIONS_RUN_URL), job [link]($GITHUB_ACTIONS_JOB_URL)._
            EOF
            gh pr create --title "$title" --body-file ./pr_body.txt" --label "automated pr"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTIONS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_ACTIONS_JOB_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs/${{ job.check_run_id }}
